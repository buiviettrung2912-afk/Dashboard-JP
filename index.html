<!DOCTYPE html>
<html lang="vi">
    <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Haravan Sales Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
        <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>
        <style type="text/tailwindcss">
                @layer components {
                    .card { @apply bg-white rounded-lg shadow-sm p-5 flex flex-col; }
                    .filter-label { @apply block text-sm font-medium text-gray-700 mb-1; }
                    .filter-input { @apply mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-50 text-sm py-2 px-3 border; }
                    .preset-btn { @apply px-3 py-1 text-sm rounded-full text-[#338eda] hover:bg-blue-50 transition-colors border border-transparent font-medium; }
                    .preset-btn.active { @apply border-[#338eda] bg-blue-50; }
                }
        </style>
    </head>
<body class="bg-[#f4f7f6] text-gray-800 min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
            <header class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold">Haravan Sales Dashboard</h1>h1>
                        <div id="lastUpdated" class="text-sm text-gray-500">Loading...</div>div>
            </header>header>
    
            <div id="loadingIndicator" class="text-center py-20">
                        <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>div>
                        <p>Processing data...</p>
            </div>div>
    
            <div id="dashboardContent" class="hidden">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                                        <div class="card">
                                                            <div class="text-xs text-gray-500 mb-1">REVENUE</div>div>
                                                            <div id="valRevenue" class="text-2xl font-bold text-blue-600">0 d</div>div>
                                        </div>div>
                                        <div class="card">
                                                            <div class="text-xs text-gray-500 mb-1">ORDERS</div>div>
                                                            <div id="valOrders" class="text-2xl font-bold">0</div>div>
                                        </div>div>
                                        <div class="card">
                                                            <div class="text-xs text-gray-500 mb-1">TICKETS</div>div>
                                                            <div id="valTickets" class="text-2xl font-bold text-emerald-600">0</div>div>
                                        </div>div>
                                        <div class="card">
                                                            <div class="text-xs text-gray-500 mb-1">AVG / ORDER</div>div>
                                                            <div id="valAvgTicket" class="text-2xl font-bold">0 d</div>div>
                                        </div>div>
                        </div>div>
            
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                                        <div class="card">
                                                            <h3 class="text-sm font-semibold mb-4">Top Products</h3>h3>
                                                            <div id="chartProducts"></div>div>
                                        </div>div>
                                        <div class="card">
                                                            <h3 class="text-sm font-semibold mb-4">By Channels</h3>h3>
                                                            <div id="chartChannels"></div>div>
                                        </div>div>
                        </div>div>
            </div>div>
    </div>div>
    <script src="app.js"></script
    </body>
    </html>
