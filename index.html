<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
        <title>Haravan Sales Dashboard</title>
            <script src="https://cdn.tailwindcss.com"></script>
                <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
                    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
                        <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>
                        </head>
                        <body class="bg-[#f4f7f6]">
                            <div class="max-w-7xl mx-auto p-6">
                                    <header class="flex justify-between items-center mb-6">
                                                <h1 class="text-2xl font-bold">Haravan Sales Dashboard</h1>
                                                            <div id="lastUpdated" class="text-sm text-gray-500">Dang tai...</div>
                                                                    </header>

                                                                            <div id="loadingIndicator" class="text-center py-20">
                                                                                        <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                                                                                                    <p>Dang xu ly du lieu...</p>
                                                                                                            </div>

                                                                                                                    <div id="dashboardContent" class="hidden">
                                                                                                                                <!-- Summary -->
                                                                                                                                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                                                                                                                                                            <div class="bg-white p-5 rounded-lg shadow-sm">
                                                                                                                                                                                <div class="text-xs text-gray-500 mb-1">DOANH THU</div>
                                                                                                                                                                                                    <div id="valRevenue" class="text-2xl font-bold text-blue-600">0</div>
                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                    <div class="bg-white p-5 rounded-lg shadow-sm">
                                                                                                                                                                                                                                                        <div class="text-xs text-gray-500 mb-1">DON HANG</div>
                                                                                                                                                                                                                                                                            <div id="valOrders" class="text-2xl font-bold">0</div>
                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                            <div class="bg-white p-5 rounded-lg shadow-sm">
                                                                                                                                                                                                                                                                                                                                <div class="text-xs text-gray-500 mb-1">VE BAN</div>
                                                                                                                                                                                                                                                                                                                                                    <div id="valTickets" class="text-2xl font-bold text-emerald-600">0</div>
                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                    <div class="bg-white p-5 rounded-lg shadow-sm">
                                                                                                                                                                                                                                                                                                                                                                                                        <div class="text-xs text-gray-500 mb-1">TB / DON</div>
                                                                                                                                                                                                                                                                                                                                                                                                                            <div id="valAvgTicket" class="text-2xl font-bold">0</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <!-- Charts -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="bg-white p-5 rounded-lg shadow-sm">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h3 class="text-sm font-semibold mb-4">Top San Pham</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div id="chartProducts"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="bg-white p-5 rounded-lg shadow-sm">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h3 class="text-sm font-semibold mb-4">Theo Kenh Ban</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="chartChannels"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script src="app.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
